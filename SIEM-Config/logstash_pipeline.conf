input {
  file {
    path => ["/var/log/auth.log", "/var/log/secure", "/var/log/syslog"]
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "linux_system"
  }

  file {
    path => ["/opt/soc-lab/logs/*.log"]
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "soc_simulation"
  }
}

filter {
  if [type] == "linux_system" {
    grok {
      match => {
        "message" => [
          "%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:host} %{DATA:program}(?:\\[%{POSINT:pid}\\])?: %{GREEDYDATA:log_message}",
          "%{TIMESTAMP_ISO8601:syslog_timestamp} %{HOSTNAME:host} %{DATA:program}: %{GREEDYDATA:log_message}"
        ]
      }
      tag_on_failure => ["_syslog_grok_failure"]
    }
  }

  if [message] =~ /Failed password|authentication failure/i {
    mutate {
      add_tag => ["brute_force_candidate", "attack.t1110"]
    }
  }

  if [message] =~ /\\.xyz|\\.top|\\.ru/i {
    mutate {
      add_tag => ["suspicious_dns_candidate", "attack.t1071.004"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://localhost:9200"]
    index => "soc-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}